<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Sabías Que? - Psicopedagogía</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        h1 { color: var(--text); margin-bottom: 1rem; font-size: 1.8rem; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 1rem; font-size: 1rem; outline: none; }
        #dato-display { min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 15px 0; background: #fdfdfd; border-left: 6px solid var(--primary); padding: 20px; border-radius: 8px; font-size: 1.15rem; color: #34495e; line-height: 1.5; font-style: italic; position: relative; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { border: none; padding: 14px; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-ws { background: #25D366; color: white; display: none; text-decoration: none; align-items: center; justify-content: center; }
        .btn-ws svg { margin-right: 8px; }
        .cat-tag { font-size: 0.75rem; color: #95a5a6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>💡 Sabías que...</h1>
    <select id="categoria">
        <option value="todas">Cualquier Categoría</option>
        <option value="Cerebro y Aprendizaje">Cerebro y Aprendizaje</option>
        <option value="Psicopedagogía y Dificultades">Psicopedagogía y Dificultades</option>
        <option value="Teorías y Autores">Teorías y Autores</option>
        <option value="Curiosidades de la Educación">Curiosidades de la Educación</option>
        <option value="Desarrollo Infantil">Desarrollo Infantil</option>
        <option value="Inclusión y Diversidad">Inclusión y Diversidad</option>
        <option value="Técnicas de Estudio">Técnicas de Estudio</option>
        <option value="Neurociencia Educativa">Neurociencia Educativa</option>
        <option value="Datos Históricos">Datos Históricos</option>
        <option value="Salud y Bienestar">Salud y Bienestar</option>
    </select>
    
    <div id="dato-display">
        <span class="cat-tag" id="tag">Educación</span>
        <div id="texto">Haz clic en el botón para descubrir un dato fascinante.</div>
    </div>
    
    <div class="btn-group">
        <button class="btn-main" onclick="obtenerDato()">Lanzar Dato al Azar</button>
        <a id="btn-ws" class="btn-ws" target="_blank">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217s.231.001.332.005c.109.004.258-.041.404.314l.542 1.312c.058.141.096.305.002.494-.095.188-.145.303-.289.469-.144.166-.301.371-.429.498-.144.144-.295.302-.127.592.167.288.745 1.229 1.597 1.983.852.753 1.564 1.042 1.851 1.187.288.144.455.121.623-.073.167-.193.721-.838.914-1.127.192-.288.384-.241.647-.144.264.096 1.681.794 1.969.939.289.144.481.217.553.342.072.126.072.723-.072 1.128z"/></svg>
            Compartir en WhatsApp
        </a>
    </div>
</div>

<script>

};

function obtenerDato() {
    const sel = document.getElementById('categoria').value;
    let pool = [], catName = "";

    if (sel === "todas") {
        const keys = Object.keys(biblioteca);
        catName = keys[Math.floor(Math.random() * keys.length)];
        pool = biblioteca[catName];
    } else {
        catName = sel;
        pool = biblioteca[sel];
    }

    const dato = pool[Math.floor(Math.random() * pool.length)];
    
    document.getElementById('texto').innerText = dato;
    document.getElementById('tag').innerText = catName;
    
    // Configurar botón WhatsApp
    const btnWs = document.getElementById('btn-ws');
    const mensaje = encodeURIComponent(`💡 *¿Sabías que?* \n\n"${dato}" \n\n(Categoría: ${catName})`);
    btnWs.href = `https://wa.me{mensaje}`;
    btnWs.style.display = "flex";
}
</script>
</body>
</html>
